<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" font-family="Segoe UI, Arial, sans-serif">
  <title>Challenge 1 &middot; Build the Contract Intake &amp; Drafting Agent</title>
  <defs>
    <linearGradient id="ag1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0078D4"/><stop offset="1" stop-color="#5C2D91"/>
    </linearGradient>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#605E5C"/>
    </marker>
  </defs>
  <rect width="1000" height="520" fill="#F8FAFC"/>
  <rect x="40" y="220" width="140" height="80" rx="10" fill="#FFF" stroke="#E1DFDD"/>
  <text x="110" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#201F1E">User</text>
  <text x="110" y="270" text-anchor="middle" font-size="11" fill="#605E5C">First prompt</text>

  <rect x="220" y="220" width="140" height="80" rx="10" fill="#DEECF9" stroke="#0078D4"/>
  <text x="290" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#0078D4">Thread</text>
  <text x="290" y="270" text-anchor="middle" font-size="11" fill="#605E5C">Message history</text>

  <rect x="400" y="100" width="420" height="320" rx="18" fill="#FFF" stroke="#0078D4" stroke-width="2"/>
  <text x="610" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#201F1E">Contract Intake &amp; Drafting Agent</text>
  <rect x="420" y="145" width="380" height="46" rx="8" fill="url(#ag1)"/>
  <text x="610" y="173" text-anchor="middle" font-size="12" font-weight="600" fill="#FFF">Instructions &#183; MISSION &#183; BEHAVIOR &#183; GUARDRAILS</text>

  <rect x="420" y="205" width="115" height="60" rx="8" fill="#DEECF9" stroke="#0078D4"/>
  <text x="477" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#0078D4">Model</text>
  <text x="477" y="248" text-anchor="middle" font-size="10" fill="#605E5C">gpt-4o</text>

  <rect x="548" y="205" width="115" height="60" rx="8" fill="#F3F5FB" stroke="#605E5C"/>
  <text x="605" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#605E5C">Params</text>
  <text x="605" y="248" text-anchor="middle" font-size="10" fill="#605E5C">temp 0.2 &#183; top_p 0.9</text>

  <rect x="676" y="205" width="120" height="60" rx="8" fill="#E6FBF6" stroke="#00B294"/>
  <text x="736" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#008A72">Refusal</text>
  <text x="736" y="248" text-anchor="middle" font-size="10" fill="#605E5C">no legal advice</text>

  <rect x="420" y="280" width="380" height="52" rx="8" fill="#FFF7E6" stroke="#FFB900"/>
  <text x="610" y="305" text-anchor="middle" font-size="12" font-weight="600" fill="#8A6100">Safety layer &#183; Content Safety + Prompt Shields</text>
  <text x="610" y="322" text-anchor="middle" font-size="10" fill="#605E5C">applied to prompt and response</text>

  <rect x="420" y="345" width="380" height="55" rx="8" fill="#F3F5FB" stroke="#0078D4"/>
  <text x="610" y="370" text-anchor="middle" font-size="12" font-weight="600" fill="#201F1E">Golden turns</text>
  <text x="610" y="388" text-anchor="middle" font-size="10" fill="#605E5C">draft NDA &#183; lawsuit refusal &#183; sanctioned entity refusal &#183; small talk redirect</text>

  <rect x="860" y="220" width="120" height="80" rx="10" fill="#FDECEC" stroke="#D13438"/>
  <text x="920" y="248" text-anchor="middle" font-size="12" font-weight="700" fill="#A4262C">App Insights</text>
  <text x="920" y="266" text-anchor="middle" font-size="10" fill="#605E5C">1 trace per turn</text>

  <g stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)">
    <path d="M180 260 H 220"/>
    <path d="M360 260 H 400"/>
    <path d="M820 260 H 860"/>
