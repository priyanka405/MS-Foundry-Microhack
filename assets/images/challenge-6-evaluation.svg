  <text x="340" y="272" text-anchor="middle" font-size="10" fill="#605E5C">under eval config</text>
  <text x="340" y="292" text-anchor="middle" font-size="10" fill="#605E5C">records tool trace</text>

  <rect x="480" y="90" width="230" height="160" rx="10" fill="#DEECF9" stroke="#0078D4"/>
  <text x="595" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#0078D4">Quality evaluators</text>
  <text x="595" y="142" text-anchor="middle" font-size="11" fill="#605E5C">Groundedness &#8805; 4.0</text>
  <text x="595" y="160" text-anchor="middle" font-size="11" fill="#605E5C">Relevance &#8805; 4.0</text>
  <text x="595" y="178" text-anchor="middle" font-size="11" fill="#605E5C">Coherence &#8805; 4.0</text>
  <text x="595" y="196" text-anchor="middle" font-size="11" fill="#605E5C">Task adherence &#8805; 4.25</text>
  <text x="595" y="214" text-anchor="middle" font-size="11" fill="#605E5C">Tool-call accuracy &#8805; 0.9</text>
  <text x="595" y="238" text-anchor="middle" font-size="10" fill="#605E5C">AI-assisted, 1&#8211;5 scale</text>

  <rect x="480" y="270" width="230" height="160" rx="10" fill="#FDECEC" stroke="#D13438"/>
  <text x="595" y="298" text-anchor="middle" font-size="13" font-weight="700" fill="#A4262C">Safety evaluators</text>
  <text x="595" y="322" text-anchor="middle" font-size="11" fill="#605E5C">Hate / Sexual / Violence</text>
  <text x="595" y="340" text-anchor="middle" font-size="11" fill="#605E5C">Self-harm</text>
  <text x="595" y="358" text-anchor="middle" font-size="11" fill="#605E5C">Indirect attack</text>
  <text x="595" y="376" text-anchor="middle" font-size="11" fill="#605E5C">Prompt shield</text>
  <text x="595" y="402" text-anchor="middle" font-size="10" fill="#605E5C">defect rate must be 0</text>

  <rect x="760" y="190" width="200" height="150" rx="10" fill="#FFF" stroke="#E1DFDD"/>
  <text x="860" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#201F1E">Scorecard</text>
  <text x="860" y="245" text-anchor="middle" font-size="11" fill="#605E5C">JSON + portal view</text>
  <text x="860" y="275" text-anchor="middle" font-size="11" fill="#0078D4">quality &#10004;</text>
  <text x="860" y="293" text-anchor="middle" font-size="11" fill="#A4262C">safety &#10004;</text>
  <text x="860" y="315" text-anchor="middle" font-size="10" fill="#605E5C">emitted as GitHub check</text>

  <rect x="330" y="400" width="280" height="60" rx="10" fill="#E6FBF6" stroke="#00B294"/>
  <text x="470" y="428" text-anchor="middle" font-size="13" font-weight="700" fill="#008A72">CI deployment gate</text>
  <text x="470" y="448" text-anchor="middle" font-size="10" fill="#605E5C">python -m app.evaluation &#183; non-zero exit blocks merge</text>

  <g stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)">
