<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" font-family="Segoe UI, Arial, sans-serif">
  <title>Challenge 6 &middot; Evaluation</title>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#605E5C"/>
    </marker>
  </defs>
  <rect width="1000" height="520" fill="#F8FAFC"/>
  <rect x="30" y="200" width="180" height="120" rx="10" fill="#FFF7E6" stroke="#FFB900"/>
  <text x="120" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#8A6100">Test dataset</text>
  <text x="120" y="252" text-anchor="middle" font-size="11" fill="#605E5C">evaluation_dataset.jsonl</text>
  <text x="120" y="272" text-anchor="middle" font-size="11" fill="#605E5C">15 rows</text>
  <text x="120" y="292" text-anchor="middle" font-size="10" fill="#605E5C">query, context, ground_truth</text>

  <rect x="250" y="200" width="180" height="120" rx="10" fill="#FFF" stroke="#0078D4" stroke-width="2"/>
