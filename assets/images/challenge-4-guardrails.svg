<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" font-family="Segoe UI, Arial, sans-serif">
  <title>Challenge 4 &middot; Guardrails</title>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#605E5C"/>
    </marker>
  </defs>
  <rect width="1000" height="520" fill="#F8FAFC"/>
  <rect x="40" y="220" width="140" height="80" rx="10" fill="#FFF" stroke="#E1DFDD"/>
  <text x="110" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#201F1E">User input</text>
  <text x="110" y="270" text-anchor="middle" font-size="11" fill="#605E5C">prompt + files</text>

  <rect x="220" y="80" width="240" height="360" rx="16" fill="#FFF7E6" stroke="#FFB900" stroke-width="2"/>
  <text x="340" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#8A6100">Input safety</text>
  <rect x="240" y="130" width="200" height="55" rx="8" fill="#FFF" stroke="#FFB900"/>
  <text x="340" y="153" text-anchor="middle" font-size="12" font-weight="600" fill="#8A6100">Content Safety</text>
  <text x="340" y="170" text-anchor="middle" font-size="10" fill="#605E5C">Hate / Sex / Violence / Self-harm</text>
  <rect x="240" y="195" width="200" height="55" rx="8" fill="#FFF" stroke="#FFB900"/>
  <text x="340" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#8A6100">Prompt Shields</text>
  <text x="340" y="235" text-anchor="middle" font-size="10" fill="#605E5C">Jailbreak &amp; indirect attack</text>
  <rect x="240" y="260" width="200" height="55" rx="8" fill="#FFF" stroke="#FFB900"/>
  <text x="340" y="283" text-anchor="middle" font-size="12" font-weight="600" fill="#8A6100">PII detection</text>
  <text x="340" y="300" text-anchor="middle" font-size="10" fill="#605E5C">redact SSN / IBAN / email</text>
  <rect x="240" y="325" width="200" height="55" rx="8" fill="#FFF" stroke="#FFB900"/>
  <text x="340" y="348" text-anchor="middle" font-size="12" font-weight="600" fill="#8A6100">App blocklists</text>
  <text x="340" y="365" text-anchor="middle" font-size="10" fill="#605E5C">sanctioned entities / competitors</text>

  <rect x="500" y="180" width="240" height="200" rx="16" fill="#FFF" stroke="#0078D4" stroke-width="2"/>
  <text x="620" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#201F1E">Agent</text>
  <text x="620" y="235" text-anchor="middle" font-size="11" fill="#605E5C">only reached if safe</text>
  <rect x="520" y="255" width="200" height="42" rx="8" fill="#DEECF9" stroke="#0078D4"/>
  <text x="620" y="282" text-anchor="middle" font-size="12" font-weight="600" fill="#0078D4">Restricted-clause check</text>
  <rect x="520" y="308" width="200" height="42" rx="8" fill="#DEECF9" stroke="#0078D4"/>
  <text x="620" y="335" text-anchor="middle" font-size="12" font-weight="600" fill="#0078D4">Approved-template check</text>

  <rect x="780" y="80" width="180" height="360" rx="16" fill="#FDECEC" stroke="#D13438" stroke-width="2"/>
  <text x="870" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#A4262C">Output safety</text>
  <rect x="800" y="130" width="140" height="55" rx="8" fill="#FFF" stroke="#D13438"/>
  <text x="870" y="153" text-anchor="middle" font-size="12" font-weight="600" fill="#A4262C">Content Safety</text>
  <text x="870" y="170" text-anchor="middle" font-size="10" fill="#605E5C">check response</text>
  <rect x="800" y="195" width="140" height="55" rx="8" fill="#FFF" stroke="#D13438"/>
  <text x="870" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#A4262C">PII redaction</text>
  <text x="870" y="235" text-anchor="middle" font-size="10" fill="#605E5C">before send</text>
  <rect x="800" y="260" width="140" height="55" rx="8" fill="#FFF" stroke="#D13438"/>
  <text x="870" y="283" text-anchor="middle" font-size="12" font-weight="600" fill="#A4262C">Refusal shim</text>
  <text x="870" y="300" text-anchor="middle" font-size="10" fill="#605E5C">safe fallback text</text>
  <rect x="800" y="325" width="140" height="55" rx="8" fill="#FFF" stroke="#D13438"/>
  <text x="870" y="348" text-anchor="middle" font-size="12" font-weight="600" fill="#A4262C">Audit log</text>
  <text x="870" y="365" text-anchor="middle" font-size="10" fill="#605E5C">defect telemetry</text>

  <g stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)">
    <path d="M180 260 H 220"/>
    <path d="M460 260 H 500"/>
    <path d="M740 260 H 780"/>
  </g>
  <text x="500" y="470" text-anchor="middle" font-size="11" fill="#605E5C">Guardrails wrap the agent on both sides &#183; every rejection is telemetry, not a stack trace</text>
</svg>
