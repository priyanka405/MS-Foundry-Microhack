<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 32px; font-weight: bold; fill: #1a1a1a; }
      .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #4a7c7e; letter-spacing: 2px; }
      .layer-title-blue { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #4a90e2; letter-spacing: 2px; }
      .layer-title-orange { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #d4a574; letter-spacing: 2px; }
      .box-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #2c2c2c; text-anchor: middle; }
      .small-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: 500; fill: #555; text-anchor: middle; }
      .governance-item { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #d4a574; }
      .border-light-green { stroke: #a8d5ba; stroke-width: 3; fill: none; }
      .border-light-blue { stroke: #a6c8e1; stroke-width: 3; fill: none; }
      .border-orange { stroke: #e5c4a0; stroke-width: 3; fill: none; }
      .bg-light-green { fill: #e8f4f0; }
      .bg-light-blue { fill: #e6f1f8; }
      .bg-orange { fill: #fef5e8; }
      .bg-dark-blue { fill: #663399; }
      .bg-white { fill: #ffffff; }
      .bg-light-purple { fill: #f0e8ff; }
      .arrow { stroke: #555; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-dashed { stroke: #999; stroke-width: 2; stroke-dasharray: 5,5; fill: none; marker-end: url(#arrowhead-light); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#555" />
    </marker>
    <marker id="arrowhead-light" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#999" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="800" y="50" class="title" text-anchor="middle">Contract Lifecycle Management — Target Architecture on Microsoft Foundry</text>

  <!-- ============== USER LAYER ============== -->
  <rect x="180" y="90" width="900" height="180" class="border-light-green" rx="15" />
  <text x="210" y="125" class="section-title">USER LAYER</text>

  <!-- Inner box -->
  <rect x="210" y="145" width="850" height="110" class="border-light-green" rx="12" />

  <!-- Human icon -->
  <circle cx="80" cy="210" r="40" fill="none" stroke="#4a90e2" stroke-width="3"/>
  <circle cx="80" cy="175" r="16" fill="#4a90e2"/>
  <path d="M 65 215 Q 80 235 95 215" fill="none" stroke="#4a90e2" stroke-width="3" stroke-linecap="round"/>

  <!-- Arrow to user layer -->
  <path d="M 130 210 L 210 210" class="arrow"/>

  <!-- Teams icon/box -->
  <rect x="240" y="170" width="100" height="80" class="bg-white" stroke="#663399" stroke-width="2.5" rx="8"/>
  <rect x="255" y="185" width="70" height="50" fill="#663399" rx="4"/>
  <text x="290" y="225" class="box-label" fill="#ffffff" font-size="11">Teams</text>

  <!-- Plus -->
  <text x="360" y="220" class="box-label" font-size="28" fill="#666">+</text>

  <!-- Copilot icon/box -->
  <rect x="390" y="170" width="100" height="80" class="bg-white" stroke="#663399" stroke-width="2.5" rx="8"/>
  <rect x="405" y="185" width="70" height="50" fill="#663399" rx="4"/>
  <text x="440" y="225" class="box-label" fill="#ffffff" font-size="11">Copilot</text>

  <!-- Plus -->
  <text x="510" y="220" class="box-label" font-size="28" fill="#666">+</text>

  <!-- Web App icon/box -->
  <rect x="540" y="170" width="100" height="80" class="bg-white" stroke="#333" stroke-width="2.5" rx="8"/>
  <path d="M 555 185 L 580 185 Q 590 185 590 200 L 590 240 Q 590 250 580 250 L 560 250 Q 550 250 550 240 L 550 200 Q 550 185 560 185" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="570" cy="205" r="2" fill="#333"/>
  <circle cx="580" cy="205" r="2" fill="#333"/>
  <text x="590" y="225" class="box-label" font-size="11">Web App</text>

  <!-- Description text -->
  <text x="680" y="190" class="small-text" font-size="13" text-anchor="start" fill="#333">Teams / M365 Copilot · Custom Web App</text>
  <text x="680" y="210" class="small-text" font-size="13" text-anchor="start" fill="#333">(container app)</text>

  <!-- ============== AGENT LAYER ============== -->
  <rect x="180" y="300" width="680" height="550" class="border-light-blue" rx="15" />
  <text x="210" y="335" class="layer-title-blue">AGENT LAYER — AZURE AI FOUNDRY</text>

  <!-- Main Agent Box -->
  <rect x="220" y="365" width="600" height="130" fill="#5d3a9b" rx="12" />
  
  <!-- Agent icon -->
  <circle cx="260" cy="400" r="35" fill="#9d5eff" opacity="0.8"/>
  <polygon points="260,370 275,395 245,395" fill="#ffffff"/>
  <circle cx="260" cy="410" r="5" fill="#ffffff"/>

  <!-- Agent text -->
  <text x="380" y="395" class="box-label" fill="#ffffff" font-size="24" text-anchor="start">Contract Lifecycle</text>
  <text x="380" y="425" class="box-label" fill="#ffffff" font-size="24" text-anchor="start">Management Agent</text>

  <!-- Arrow from User to Agent -->
  <path d="M 630 270 L 630 365" class="arrow"/>

  <!-- Tool boxes -->
  <!-- Foundry IQ -->
  <rect x="220" y="530" width="130" height="120" class="bg-light-purple" stroke="#9d5eff" stroke-width="2" rx="10"/>
  <circle cx="245" cy="555" r="20" fill="#7c3aed"/>
  <polygon points="245,545 255,560 235,560" fill="#ffffff"/>
  <text x="285" y="560" class="box-label" font-size="12">Foundry IQ</text>
  <text x="285" y="580" class="small-text" font-size="11">Foundry IQ</text>

  <!-- Web IQ -->
  <rect x="370" y="530" width="130" height="120" class="bg-white" stroke="#333" stroke-width="2" rx="10"/>
  <circle cx="395" cy="555" r="20" fill="#ddd"/>
  <path d="M 390 550 L 400 560 M 400 550 L 390 560" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <text x="435" y="560" class="box-label" font-size="12">Web IQ</text>
  <text x="435" y="580" class="small-text" font-size="11">public web</text>

  <!-- Azure SQL MCP Server -->
  <rect x="520" y="530" width="130" height="120" class="bg-light-purple" stroke="#9d5eff" stroke-width="2" rx="10"/>
  <circle cx="545" cy="555" r="20" fill="#7c3aed"/>
  <circle cx="545" cy="555" r="12" fill="none" stroke="#ffffff" stroke-width="2"/>
  <text x="585" y="555" class="box-label" font-size="11">Azure SQL</text>
  <text x="585" y="572" class="small-text" font-size="10">MCP Server</text>
  <text x="585" y="590" class="small-text" font-size="9" fill="#7c3aed">MCP</text>

  <!-- Custom MCP Server (dashed border) -->
  <rect x="670" y="530" width="130" height="120" class="bg-white" stroke="#b19cd9" stroke-width="2.5" stroke-dasharray="6,4" rx="10"/>
  <circle cx="695" cy="555" r="20" fill="#d9c9f0"/>
  <text x="735" y="555" class="box-label" font-size="11" fill="#7c3aed">Custom MCP</text>
  <text x="735" y="572" class="small-text" font-size="10" fill="#7c3aed">Server</text>
  <text x="735" y="590" class="small-text" font-size="9" fill="#b19cd9">MCP</text>

  <!-- Arrows from Agent to Tools -->
  <path d="M 300 495 L 285 530" class="arrow"/>
  <path d="M 420 495 L 420 530" class="arrow"/>
  <path d="M 550 495 L 560 530" class="arrow-dashed"/>
  <path d="M 720 495 L 735 530" class="arrow-dashed"/>

  <!-- ============== DATA LAYER ============== -->
  <rect x="920" y="300" width="550" height="550" class="border-light-blue" rx="15" />
  <text x="950" y="335" class="layer-title-blue">DATA LAYER</text>

  <!-- SharePoint box -->
  <rect x="960" y="380" width="470" height="100" class="bg-light-blue" stroke="#4a90e2" stroke-width="2" rx="10"/>
  <circle cx="1010" cy="425" r="25" fill="#0ea5e9"/>
  <text x="1010" y="435" class="box-label" fill="#ffffff" font-size="18" font-weight="bold">S</text>
  <text x="1090" y="430" class="box-label" font-size="15" text-anchor="start" fill="#333">SharePoint</text>

  <!-- Azure AI Search box -->
  <rect x="960" y="510" width="470" height="100" class="bg-light-blue" stroke="#4a90e2" stroke-width="2" rx="10"/>
  <circle cx="1010" cy="555" r="25" fill="#0ea5e9"/>
  <path d="M 1000 545 L 1020 565 M 1020 545 L 1000 565" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <text x="1090" y="560" class="box-label" font-size="15" text-anchor="start" fill="#333">Azure AI Search</text>

  <!-- Azure SQL box -->
  <rect x="960" y="640" width="470" height="100" class="bg-light-blue" stroke="#4a90e2" stroke-width="2" rx="10"/>
  <circle cx="1010" cy="685" r="25" fill="#0ea5e9"/>
  <circle cx="1010" cy="685" r="18" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <text x="1090" y="690" class="box-label" font-size="15" text-anchor="start" fill="#333">Azure SQL</text>

  <!-- Arrows between layers (Agent ↔ Data) -->
  <path d="M 820 430 L 960 430" class="arrow" stroke-width="2.5"/>
  <path d="M 820 500 L 960 560" class="arrow" stroke-width="2.5"/>
  <path d="M 820 600 L 960 690" class="arrow" stroke-width="2.5"/>

  <path d="M 960 440 L 820 490" class="arrow" stroke-width="2.5"/>
  <path d="M 960 560 L 820 510" class="arrow" stroke-width="2.5"/>
  <path d="M 960 690 L 820 610" class="arrow" stroke-width="2.5"/>

  <!-- ============== GOVERNANCE LAYER ============== -->
  <rect x="1540" y="90" width="200" height="760" class="border-orange" rx="15" />
  <text x="1570" y="130" class="layer-title-orange">GOVERNANCE</text>

  <!-- Entra ID -->
  <g>
    <rect x="1560" y="165" width="160" height="120" class="bg-orange" stroke="#d4a574" stroke-width="2" rx="10"/>
    <circle cx="1600" cy="200" r="22" fill="#d4a574"/>
    <path d="M 1600 190 Q 1595 195 1595 200 Q 1595 207 1600 210 Q 1605 207 1605 200 Q 1605 195 1600 190" fill="#ffffff"/>
    <text x="1650" y="210" class="governance-item" text-anchor="start">Entra ID</text>
  </g>

  <!-- Purview -->
  <g>
    <rect x="1560" y="315" width="160" height="120" class="bg-orange" stroke="#d4a574" stroke-width="2" rx="10"/>
    <circle cx="1600" cy="350" r="22" fill="#d4a574"/>
    <path d="M 1590 345 L 1610 345 M 1595 350 L 1605 350 M 1590 355 L 1610 355" stroke="#ffffff" stroke-width="2"/>
    <text x="1650" y="360" class="governance-item" text-anchor="start">Purview</text>
  </g>

  <!-- Content Safety -->
  <g>
    <rect x="1560" y="465" width="160" height="120" class="bg-orange" stroke="#d4a574" stroke-width="2" rx="10"/>
    <circle cx="1600" cy="500" r="22" fill="#d4a574"/>
    <path d="M 1600 485 L 1595 500 L 1600 515 L 1605 500 Z" fill="#ffffff"/>
    <text x="1650" y="510" class="governance-item" text-anchor="start">Content Safety</text>
  </g>

  <!-- Prompt Shields -->
  <g>
    <rect x="1560" y="615" width="160" height="120" class="bg-orange" stroke="#d4a574" stroke-width="2" rx="10"/>
    <circle cx="1600" cy="650" r="22" fill="#d4a574"/>
    <rect x="1590" y="640" width="20" height="20" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="1650" y="660" class="governance-item" text-anchor="start">Prompt Shields</text>
  </g>

  <!-- App Insights -->
  <g>
    <rect x="1560" y="765" width="160" height="120" class="bg-orange" stroke="#d4a574" stroke-width="2" rx="10"/>
    <circle cx="1600" cy="800" r="22" fill="#d4a574"/>
    <path d="M 1595 790 L 1605 790 L 1605 810 L 1595 810 Z M 1597 800 L 1603 800" stroke="#ffffff" stroke-width="2" fill="none"/>
    <text x="1650" y="810" class="governance-item" text-anchor="start">App Insights</text>
  </g>

  <!-- Arrows to Governance -->
  <path d="M 1540 430 L 1480 430" class="arrow" stroke-width="2"/>
  <path d="M 1540 470 L 1480 470" class="arrow" stroke-width="2"/>
  <path d="M 1540 510 L 1480 520" class="arrow" stroke-width="2"/>
  <path d="M 1540 650 L 1480 660" class="arrow" stroke-width="2"/>
  <path d="M 1540 750 L 1480 750" class="arrow" stroke-width="2"/>

</svg>
