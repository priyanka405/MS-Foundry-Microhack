<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #1f2937; }
      .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #4b5563; letter-spacing: 1px; }
      .component-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #1f2937; text-anchor: middle; }
      .governance-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 15px; font-weight: 500; fill: #b45309; }
      .border-green { stroke: #6ee7b7; stroke-width: 2; fill: none; }
      .border-blue { stroke: #93c5fd; stroke-width: 2; fill: none; }
      .border-yellow { stroke: #fcd34d; stroke-width: 2; fill: none; }
      .bg-green { fill: #d1fae5; }
      .bg-blue { fill: #dbeafe; }
      .bg-yellow { fill: #fef3c7; }
      .bg-purple { fill: #e9d5ff; }
      .bg-white { fill: #ffffff; }
      .icon-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #1f2937; text-anchor: middle; }
      .arrow { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#374151" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="40" class="title" text-anchor="middle">Contract Lifecycle Management — Target Architecture on Microsoft Foundry</text>

  <!-- USER LAYER -->
  <!-- User Layer Box -->
  <rect x="190" y="70" width="680" height="140" class="border-green" rx="10" />
  <text x="210" y="95" class="section-title">USER LAYER</text>

  <!-- Inner box for user interfaces -->
  <rect x="220" y="110" width="630" height="90" class="border-green" rx="8" />

  <!-- Human icon -->
  <circle cx="120" cy="155" r="30" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="120" cy="135" r="12" fill="#3b82f6"/>
  <path d="M 110 155 Q 120 165 130 155" fill="none" stroke="#3b82f6" stroke-width="2"/>

  <!-- Arrow from human -->
  <path d="M 150 155 L 220 155" class="arrow"/>

  <!-- Teams -->
  <rect x="240" y="125" width="70" height="60" class="bg-white" stroke="#7c3aed" stroke-width="2" rx="5"/>
  <text x="275" y="155" class="icon-text">Teams</text>

  <!-- Plus sign -->
  <text x="330" y="165" class="icon-text" font-size="24" font-weight="bold">+</text>

  <!-- Copilot/Foundry -->
  <rect x="360" y="125" width="70" height="60" class="bg-white" stroke="#7c3aed" stroke-width="2" rx="5"/>
  <text x="395" y="155" class="icon-text" font-size="14">Copilot</text>

  <!-- Plus sign -->
  <text x="450" y="165" class="icon-text" font-size="24" font-weight="bold">+</text>

  <!-- Web App -->
  <rect x="480" y="125" width="70" height="60" class="bg-white" stroke="#1f2937" stroke-width="2" rx="5"/>
  <text x="515" y="155" class="icon-text" font-size="12">Web App</text>

  <!-- Text label -->
  <text x="580" y="140" class="icon-text" font-size="13">Teams / M365 Copilot · Custom Web App (container app)</text>

  <!-- AGENT LAYER - AZURE AI FOUNDRY -->
  <!-- Agent Layer Box -->
  <rect x="190" y="240" width="520" height="400" class="border-blue" rx="10" />
  <text x="210" y="265" class="section-title">AGENT LAYER — AZURE AI FOUNDRY</text>

  <!-- Contract Lifecycle Management Agent -->
  <rect x="220" y="290" width="460" height="100" fill="#6d28d9" rx="8" />
  <circle cx="240" cy="315" r="25" fill="#a78bfa" />
  <path d="M 230 310 L 240 300 L 250 310 M 240 300 L 240 325" stroke="#6d28d9" stroke-width="2" fill="none"/>
  <text x="340" y="325" class="component-label" fill="#ffffff" font-size="24">Contract Lifecycle</text>
  <text x="340" y="355" class="component-label" fill="#ffffff" font-size="24">Management Agent</text>

  <!-- Arrow from User Layer to Agent -->
  <path d="M 500 210 L 500 290" class="arrow"/>

  <!-- Tools/Capabilities -->
  <!-- Foundry IQ -->
  <rect x="220" y="420" width="100" height="95" class="bg-purple border-green" rx="8" stroke-width="1"/>
  <text x="270" y="445" class="icon-text" font-size="14" font-weight="bold">Foundry IQ</text>
  <text x="270" y="480" class="icon-text" font-size="12">Foundry IQ</text>

  <!-- Web IQ -->
  <rect x="345" y="420" width="100" height="95" class="bg-white" stroke="#1f2937" stroke-width="1" rx="8"/>
  <text x="395" y="445" class="icon-text" font-size="14" font-weight="bold">Web IQ</text>
  <text x="395" y="490" class="icon-text" font-size="11" font-weight="500">public web</text>

  <!-- Azure SQL MCP Server -->
  <rect x="470" y="420" width="100" height="95" class="bg-purple border-green" rx="8" stroke-width="1"/>
  <text x="520" y="445" class="icon-text" font-size="13" font-weight="bold">Azure SQL</text>
  <text x="520" y="465" class="icon-text" font-size="13" font-weight="bold">MCP Server</text>
  <text x="520" y="490" class="icon-text" font-size="11" fill="#7c3aed">MCP</text>

  <!-- Custom MCP Server (dashed) -->
  <rect x="595" y="420" width="100" height="95" class="bg-white" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,5" rx="8"/>
  <text x="645" y="445" class="icon-text" font-size="13" font-weight="bold">Custom MCP</text>
  <text x="645" y="465" class="icon-text" font-size="13" font-weight="bold">Server</text>
  <text x="645" y="490" class="icon-text" font-size="11" fill="#a78bfa">MCP</text>

  <!-- Arrows from Agent to Tools -->
  <path d="M 270 390 L 270 420" class="arrow"/>
  <path d="M 375 390 L 375 420" class="arrow"/>
  <path d="M 500 390 L 520 420" class="arrow" stroke-dasharray="5,5"/>
  <path d="M 600 390 L 645 420" class="arrow" stroke-dasharray="5,5"/>

  <!-- DATA LAYER -->
  <!-- Data Layer Box -->
  <rect x="750" y="240" width="400" height="400" class="border-blue" rx="10" />
  <text x="770" y="265" class="section-title">DATA LAYER</text>

  <!-- SharePoint -->
  <rect x="780" y="300" width="340" height="70" class="bg-blue" stroke="#3b82f6" stroke-width="1" rx="8"/>
  <circle cx="810" cy="335" r="20" fill="#0ea5e9" />
  <text x="810" y="340" class="icon-text" fill="#ffffff" font-size="14" font-weight="bold">S</text>
  <text x="870" y="335" class="icon-text">SharePoint</text>

  <!-- Azure AI Search -->
  <rect x="780" y="395" width="340" height="70" class="bg-blue" stroke="#3b82f6" stroke-width="1" rx="8"/>
  <circle cx="810" cy="430" r="20" fill="#0ea5e9" />
  <path d="M 805 425 L 815 435 M 815 425 L 805 435" stroke="#ffffff" stroke-width="2"/>
  <text x="870" y="430" class="icon-text">Azure AI Search</text>

  <!-- Azure SQL -->
  <rect x="780" y="490" width="340" height="70" class="bg-blue" stroke="#3b82f6" stroke-width="1" rx="8"/>
  <circle cx="810" cy="525" r="20" fill="#0ea5e9" />
  <circle cx="810" cy="525" r="14" fill="none" stroke="#ffffff" stroke-width="2"/>
  <text x="870" y="525" class="icon-text">Azure SQL</text>

  <!-- Arrows between Agent and Data layers -->
  <path d="M 680 330 L 750 330" class="arrow" stroke-width="2"/>
  <path d="M 680 370 L 750 420" class="arrow" stroke-width="2"/>
  <path d="M 680 410 L 750 510" class="arrow" stroke-width="2"/>

  <!-- Reverse arrows -->
  <path d="M 750 340 L 680 350" class="arrow" stroke-width="2"/>
  <path d="M 750 430 L 680 380" class="arrow" stroke-width="2"/>
  <path d="M 750 520 L 680 420" class="arrow" stroke-width="2"/>

  <!-- GOVERNANCE LAYER -->
  <!-- Governance Box -->
  <rect x="1200" y="70" width="150" height="570" class="border-yellow" rx="10" />
  <text x="1220" y="95" class="section-title" fill="#b45309">GOVERNANCE</text>

  <!-- Governance items -->
  <!-- Entra ID -->
  <g>
    <rect x="1220" y="130" width="110" height="80" class="bg-yellow" stroke="#f59e0b" stroke-width="1" rx="6"/>
    <circle cx="1245" cy="155" r="12" fill="#f59e0b"/>
    <text x="1245" y="160" class="governance-label" font-size="10" text-anchor="middle" fill="#ffffff">👤</text>
    <text x="1275" y="165" class="governance-label" font-size="12">Entra ID</text>
  </g>

  <!-- Purview -->
  <g>
    <rect x="1220" y="230" width="110" height="80" class="bg-yellow" stroke="#f59e0b" stroke-width="1" rx="6"/>
    <circle cx="1245" cy="255" r="12" fill="#f59e0b"/>
    <text x="1245" y="260" class="governance-label" font-size="14" text-anchor="middle" fill="#ffffff">🔍</text>
    <text x="1275" y="265" class="governance-label" font-size="12">Purview</text>
  </g>

  <!-- Content Safety -->
  <g>
    <rect x="1220" y="330" width="110" height="80" class="bg-yellow" stroke="#f59e0b" stroke-width="1" rx="6"/>
    <circle cx="1245" cy="355" r="12" fill="#f59e0b"/>
    <text x="1245" y="360" class="governance-label" font-size="12" text-anchor="middle" fill="#ffffff">🛡️</text>
    <text x="1275" y="363" class="governance-label" font-size="11">Content Safety</text>
  </g>

  <!-- Prompt Shields -->
  <g>
    <rect x="1220" y="430" width="110" height="80" class="bg-yellow" stroke="#f59e0b" stroke-width="1" rx="6"/>
    <circle cx="1245" cy="455" r="12" fill="#f59e0b"/>
    <text x="1245" y="460" class="governance-label" font-size="12" text-anchor="middle" fill="#ffffff">🔐</text>
    <text x="1275" y="463" class="governance-label" font-size="11">Prompt Shields</text>
  </g>

  <!-- App Insights -->
  <g>
    <rect x="1220" y="530" width="110" height="80" class="bg-yellow" stroke="#f59e0b" stroke-width="1" rx="6"/>
    <circle cx="1245" cy="555" r="12" fill="#f59e0b"/>
    <text x="1245" y="560" class="governance-label" font-size="12" text-anchor="middle" fill="#ffffff">📊</text>
    <text x="1275" y="560" class="governance-label" font-size="11">App Insights</text>
  </g>

  <!-- Arrows to Governance -->
  <path d="M 1200 330 L 1150 330" class="arrow" stroke-width="1.5"/>
  <path d="M 1200 370 L 1150 370" class="arrow" stroke-width="1.5"/>
  <path d="M 1200 410 L 1150 410" class="arrow" stroke-width="1.5"/>
  <path d="M 1200 450 L 1150 450" class="arrow" stroke-width="1.5"/>
  <path d="M 1200 500 L 1150 500" class="arrow" stroke-width="1.5"/>
</svg>
