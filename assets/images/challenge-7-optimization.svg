<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" font-family="Segoe UI, Arial, sans-serif">
  <title>Challenge 7 &middot; Optimization loop</title>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#605E5C"/>
    </marker>
  </defs>
  <rect width="1000" height="520" fill="#F8FAFC"/>
  <circle cx="500" cy="270" r="200" fill="none" stroke="#0078D4" stroke-width="2" stroke-dasharray="6 4"/>

  <rect x="420" y="60" width="180" height="80" rx="10" fill="#DEECF9" stroke="#0078D4"/>
  <text x="510" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#0078D4">1. Baseline</text>
  <text x="510" y="106" text-anchor="middle" font-size="10" fill="#605E5C">Challenge 6 scorecard</text>
  <text x="510" y="122" text-anchor="middle" font-size="10" fill="#605E5C">save cost + latency</text>

  <rect x="720" y="220" width="180" height="100" rx="10" fill="#F3EAFF" stroke="#5C2D91"/>
  <text x="810" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#5C2D91">2. Sweep</text>
  <text x="810" y="268" text-anchor="middle" font-size="10" fill="#605E5C">model &#183; prompt &#183; retrieval</text>
  <text x="810" y="284" text-anchor="middle" font-size="10" fill="#605E5C">temperature &#183; top-k</text>
  <text x="810" y="300" text-anchor="middle" font-size="10" fill="#605E5C">one variable at a time</text>

  <rect x="420" y="400" width="180" height="80" rx="10" fill="#FFF7E6" stroke="#FFB900"/>
  <text x="510" y="428" text-anchor="middle" font-size="13" font-weight="700" fill="#8A6100">3. Score</text>
  <text x="510" y="446" text-anchor="middle" font-size="10" fill="#605E5C">same eval dataset</text>
  <text x="510" y="462" text-anchor="middle" font-size="10" fill="#605E5C">score + cost + latency</text>

  <rect x="100" y="220" width="180" height="100" rx="10" fill="#E6FBF6" stroke="#00B294"/>
  <text x="190" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#008A72">4. Compare</text>
  <text x="190" y="268" text-anchor="middle" font-size="10" fill="#605E5C">reports/sweep.csv</text>
  <text x="190" y="284" text-anchor="middle" font-size="10" fill="#605E5C">pick lowest-cost row</text>
  <text x="190" y="300" text-anchor="middle" font-size="10" fill="#605E5C">that meets thresholds</text>

  <rect x="420" y="240" width="180" height="60" rx="10" fill="#FFF" stroke="#0078D4"/>
  <text x="510" y="266" text-anchor="middle" font-size="13" font-weight="700" fill="#201F1E">Winning config</text>
  <text x="510" y="284" text-anchor="middle" font-size="10" fill="#605E5C">promoted to production</text>

  <g stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)">
    <path d="M600 100 C 700 100, 720 220, 720 240"/>
    <path d="M810 320 C 810 380, 700 400, 600 420"/>
    <path d="M420 440 C 300 420, 220 380, 220 320"/>
    <path d="M280 260 C 340 260, 380 260, 420 260"/>
  </g>
  <text x="500" y="500" text-anchor="middle" font-size="11" fill="#605E5C">Repeat quarterly &#183; a "green"  gate is a moving target</text>
</svg>
